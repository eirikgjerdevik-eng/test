<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #00003c;
    --bg-surface: #0a0a4a;
    --bg-surface-hover: #12125a;
    --bg-elevated: #16166a;
    --accent: #ea3323;
    --accent-hover: #ff4433;
    --green: #2ecc71;
    --blue-muted: #4a6fa5;
    --amber: #f0a030;
    --text-primary: #ffffff;
    --text-secondary: rgba(255,255,255,0.6);
    --text-muted: rgba(255,255,255,0.35);
    --border: rgba(255,255,255,0.08);
    --border-light: rgba(255,255,255,0.12);
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
    --month-width: 200px;
  }

  body {
    font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.5;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ---- Header ---- */
  .header {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 12px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg-primary);
    z-index: 100;
  }

  /* ---- Controls ---- */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .toggle-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toggle-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  .toggle-buttons {
    display: flex;
    background: var(--bg-surface);
    border-radius: 6px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .toggle-btn {
    padding: 6px 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .toggle-btn.active {
    background: var(--accent);
    color: white;
  }

  .toggle-btn:hover:not(.active) {
    color: var(--text-primary);
    background: var(--bg-surface-hover);
  }

  .export-btn {
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .export-btn:hover {
    color: var(--text-primary);
    background: var(--bg-surface-hover);
    border-color: var(--border-light);
  }

  .legend {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* ---- Timeline Container ---- */
  .timeline-container {
    display: flex;
    overflow-x: auto;
    overflow-y: auto;
    max-height: calc(100vh - 58px);
    position: relative;
  }

  .timeline-container::-webkit-scrollbar {
    height: 6px;
    width: 6px;
  }

  .timeline-container::-webkit-scrollbar-track {
    background: var(--bg-surface);
  }

  .timeline-container::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.12);
    border-radius: 3px;
  }

  .timeline-container::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.2);
  }

  /* ---- Lane Labels (left sidebar) ---- */
  .lane-labels {
    flex-shrink: 0;
    width: 200px;
    position: sticky;
    left: 0;
    z-index: 50;
    background: #1b1b83;
    border-right: 1px solid var(--border);
  }

  .lane-labels-header {
    height: 44px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    font-weight: 600;
  }

  .lane-label {
    padding: 0 20px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 14px;
  }

  .lane-label-text {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .lane-label-text small {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* ---- Timeline Grid ---- */
  .timeline-grid {
    flex: 1;
    min-width: 0;
    position: relative;
  }

  .months-header {
    display: flex;
    height: 44px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: #1b1b83;
    z-index: 40;
  }

  .month-header {
    width: var(--month-width);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-right: 1px solid var(--border);
  }

  .month-header.current { color: var(--accent); }

  .quarter-badge {
    font-size: 10px;
    color: var(--text-muted);
    margin-left: auto;
    font-weight: 400;
  }

  /* ---- Swim Lane ---- */
  .swim-lane {
    position: relative;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 14px 0;
  }

  .swim-lane.lane-tinted {
    /* tint color set via inline style --lane-tint */
    background: var(--lane-tint);
  }

  .lane-label.lane-tinted {
    background: var(--lane-tint);
  }

  .grid-lines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    pointer-events: none;
  }

  .grid-line {
    width: var(--month-width);
    flex-shrink: 0;
    border-right: 1px solid var(--border);
  }

  /* ---- Today Marker ---- */
  .today-marker {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
    z-index: 5;
    pointer-events: none;
    opacity: 0.5;
  }

  .today-marker::after {
    content: '';
    position: absolute;
    top: 0; left: -3px;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }

  /* ---- Roadmap Item Bar ---- */
  .roadmap-item {
    position: relative;
    height: 48px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    cursor: pointer;
    transition: all 0.15s;
    z-index: 10;
    overflow: hidden;
    white-space: nowrap;
  }

  .roadmap-item:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow);
    filter: brightness(1.1);
  }

  .roadmap-item.status-planned    { background: rgba(74,111,165,0.35); border: 1px solid rgba(74,111,165,0.5); }
  .roadmap-item.status-in-progress { background: rgba(234,51,35,0.35); border: 1px solid rgba(234,51,35,0.5); }
  .roadmap-item.status-completed  { background: rgba(46,204,113,0.35); border: 1px solid rgba(46,204,113,0.5); }
  .roadmap-item.status-at-risk    { background: rgba(240,160,48,0.35); border: 1px solid rgba(240,160,48,0.5); }

  .item-progress {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    border-radius: 8px 0 0 8px;
    pointer-events: none;
  }

  .item-progress.full { border-radius: 8px; }

  .roadmap-item.status-planned .item-progress    { background: var(--blue-muted); }
  .roadmap-item.status-in-progress .item-progress { background: var(--accent); }
  .roadmap-item.status-completed .item-progress  { background: var(--green); }
  .roadmap-item.status-at-risk .item-progress    { background: var(--amber); }

  .item-title {
    font-size: 14px;
    font-weight: 600;
    color: white;
    text-overflow: ellipsis;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  .item-pct {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    margin-left: auto;
    padding-left: 8px;
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }

  /* ---- Detail Panel ---- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,3,0.6);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  .detail-panel {
    position: fixed;
    top: 0; right: 0;
    width: 480px;
    max-width: 90vw;
    height: 100vh;
    background: var(--bg-surface);
    z-index: 210;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }

  .detail-panel.open { transform: translateX(0); }

  .detail-panel::-webkit-scrollbar { width: 5px; }
  .detail-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

  .panel-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 28px 28px 0;
  }

  .panel-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border-light);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .panel-close:hover {
    background: var(--bg-elevated);
    color: var(--text-primary);
  }

  .panel-status-badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .panel-status-badge.status-planned     { background: rgba(74,111,165,0.25); color: #7aa3d4; }
  .panel-status-badge.status-in-progress { background: rgba(234,51,35,0.2); color: #ff6655; }
  .panel-status-badge.status-completed   { background: rgba(46,204,113,0.2); color: #5dde9e; }
  .panel-status-badge.status-at-risk     { background: rgba(240,160,48,0.2); color: #f0c060; }

  .panel-title {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.25;
    padding: 14px 28px 0;
    letter-spacing: -0.5px;
  }

  .panel-timeline {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 28px 0;
    font-size: 14px;
    color: var(--text-secondary);
  }

  .panel-timeline svg { flex-shrink: 0; }

  .panel-divider {
    margin: 20px 28px;
    border: none;
    border-top: 1px solid var(--border);
  }

  .panel-section {
    padding: 0 28px;
    margin-bottom: 20px;
  }

  .panel-section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .panel-section-value {
    font-size: 15px;
    color: var(--text-primary);
    line-height: 1.6;
  }

  .panel-meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 0 28px;
    margin-bottom: 8px;
  }

  .panel-meta-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .panel-meta-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    font-weight: 600;
  }

  .panel-meta-value {
    font-size: 14px;
    font-weight: 600;
  }

  .panel-dependencies { display: flex; flex-wrap: wrap; gap: 6px; }

  .dep-tag {
    padding: 3px 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .panel-progress { padding: 0 28px; margin-bottom: 20px; }

  .progress-bar-track {
    height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 6px;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .total-width-sizer { display: block; }

  @media (max-width: 768px) {
    .header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
    .controls { flex-wrap: wrap; gap: 10px; }
    .lane-labels { width: 140px; }
    .lane-label { padding: 0 10px; font-size: 12px; }
    :root { --month-width: 150px; }
    .detail-panel { width: 100vw; }
    .legend { display: none; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="controls">
    <div class="toggle-group">
      <span class="toggle-label">Group by</span>
      <div class="toggle-buttons">
        <button class="toggle-btn active" data-group="team" onclick="setGrouping('team')">Team</button>
        <button class="toggle-btn" data-group="domain" onclick="setGrouping('domain')">Domain</button>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue-muted)"></div>Planned</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>In Progress</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>At Risk</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Completed</div>
    </div>
    <button class="export-btn" onclick="exportToPptx()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v10M4 7l4 4 4-4M2 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Export PPTX
    </button>
  </div>
</header>

<div class="timeline-container" id="timelineContainer">
  <div class="lane-labels" id="laneLabels"></div>
  <div class="timeline-grid" id="timelineGrid"></div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="panel-header">
    <div id="panelBadge"></div>
    <button class="panel-close" onclick="closePanel()">&times;</button>
  </div>
  <h2 class="panel-title" id="panelTitle"></h2>
  <div class="panel-timeline" id="panelTimeline"></div>
  <hr class="panel-divider">
  <div class="panel-progress" id="panelProgress"></div>
  <div class="panel-meta-grid" id="panelMeta"></div>
  <hr class="panel-divider">
  <div class="panel-section" id="panelWhy"></div>
  <div class="panel-section" id="panelBusiness"></div>
  <div class="panel-section" id="panelDeps"></div>
</div>

<script>

// ============ STATE ============
let grouping = 'team';
const MONTH_WIDTH = 200;
const YEAR = 2026;
const ITEM_HEIGHT = 48;
const ROW_GAP = 8;
const ROW_STEP = ITEM_HEIGHT + ROW_GAP;

// ============ RENDER ============
function render() {
  const groups = grouping === 'team' ? TEAMS : DOMAINS;
  const groupKey = grouping === 'team' ? 'team' : 'domain';

  const labelsEl = document.getElementById('laneLabels');
  labelsEl.innerHTML = `<div class="lane-labels-header">${grouping === 'team' ? 'Teams' : 'Domains'}</div>`;
  let laneIdx = 0;
  for (const [key, group] of Object.entries(groups)) {
    const items = ITEMS.filter(i => i[groupKey] === key);
    const rows = getRowCount(items);
    const laneHeight = Math.max(80, rows * ROW_STEP + 28);
    const isAlt = laneIdx % 2 === 1;
    const tintClass = isAlt ? ' lane-tinted' : '';
    const tintStyle = isAlt ? `--lane-tint:${group.color}15;` : '';
    labelsEl.innerHTML += `
      <div class="lane-label${tintClass}" style="height:${laneHeight}px;${tintStyle}border-left:3px solid ${group.color};">
        <div class="lane-label-text">
          ${group.name}
        </div>
      </div>`;
    laneIdx++;
  }

  const gridEl = document.getElementById('timelineGrid');
  const currentMonth = new Date().getMonth();

  let monthsHeader = '<div class="months-header">';
  MONTHS.forEach((m, i) => {
    const isCurrent = i === currentMonth;
    const showQuarter = i % 3 === 0;
    monthsHeader += `<div class="month-header${isCurrent ? ' current' : ''}">
      ${m.name}${showQuarter ? `<span class="quarter-badge">${m.quarter}</span>` : ''}
    </div>`;
  });
  monthsHeader += '</div>';

  let lanesHtml = '';
  let gridLaneIdx = 0;
  for (const [key, group] of Object.entries(groups)) {
    const items = ITEMS.filter(i => i[groupKey] === key);
    const rows = getRowCount(items);
    const laneHeight = Math.max(80, rows * ROW_STEP + 28);
    const isGridAlt = gridLaneIdx % 2 === 1;
    const gridTintClass = isGridAlt ? ' lane-tinted' : '';
    const gridTintStyle = isGridAlt ? `--lane-tint:${group.color}10;` : '';

    let gridLines = '<div class="grid-lines">';
    MONTHS.forEach(() => { gridLines += '<div class="grid-line"></div>'; });
    gridLines += '</div>';

    let itemsHtml = '';
    const rowAssignments = getRowAssignments(items);
    items.forEach(item => {
      const left = item.startMonth * MONTH_WIDTH;
      const width = (item.endMonth - item.startMonth) * MONTH_WIDTH;
      const row = rowAssignments[item.id];
      const top = 14 + row * ROW_STEP;
      const fullClass = item.progress === 100 ? ' full' : '';
      const pctLabel = item.progress > 0 && item.progress < 100 ? `<span class="item-pct">${item.progress}%</span>` : '';
      itemsHtml += `
        <div class="roadmap-item status-${item.status}"
             style="position:absolute; left:${left + 6}px; width:${width - 12}px; top:${top}px;"
             onclick="openPanel(${item.id})"
             title="${item.title}">
          <div class="item-progress${fullClass}" style="width:${item.progress}%"></div>
          <span class="item-title">${item.title}</span>
          ${pctLabel}
        </div>`;
    });

    const todayX = currentMonth * MONTH_WIDTH + (new Date().getDate() / 31) * MONTH_WIDTH;
    const todayHtml = `<div class="today-marker" style="left:${todayX}px"></div>`;

    lanesHtml += `<div class="swim-lane${gridTintClass}" style="height:${laneHeight}px;${gridTintStyle}">${gridLines}${todayHtml}${itemsHtml}</div>`;
    gridLaneIdx++;
  }

  gridEl.innerHTML = monthsHeader + `<div class="total-width-sizer" style="width:${12 * MONTH_WIDTH}px;position:relative">${lanesHtml}</div>`;

  setTimeout(() => {
    document.getElementById('timelineContainer').scrollLeft = 0;
  }, 0);
}

function getRowCount(items) {
  const a = getRowAssignments(items);
  let max = 0;
  for (const r of Object.values(a)) { if (r + 1 > max) max = r + 1; }
  return Math.max(1, max);
}

function getRowAssignments(items) {
  const sorted = [...items].sort((a, b) => a.startMonth - b.startMonth || a.endMonth - b.endMonth);
  const assignments = {};
  const rowEnds = [];
  for (const item of sorted) {
    let placed = false;
    for (let r = 0; r < rowEnds.length; r++) {
      if (rowEnds[r] <= item.startMonth) {
        rowEnds[r] = item.endMonth;
        assignments[item.id] = r;
        placed = true;
        break;
      }
    }
    if (!placed) {
      assignments[item.id] = rowEnds.length;
      rowEnds.push(item.endMonth);
    }
  }
  return assignments;
}

// ============ GROUPING ============
function setGrouping(g) {
  grouping = g;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.group === g));
  render();
}

// ============ DETAIL PANEL ============
function openPanel(id) {
  const item = ITEMS.find(i => i.id === id);
  if (!item) return;

  const team = TEAMS[item.team];
  const domain = DOMAINS[item.domain];
  const fmt = d => d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
  const startDate = new Date(YEAR, item.startMonth, 1);
  const endDate = new Date(YEAR, item.endMonth, 0);

  document.getElementById('panelBadge').innerHTML = `<span class="panel-status-badge status-${item.status}">${item.status.replace('-', ' ')}</span>`;
  document.getElementById('panelTitle').textContent = item.title;
  document.getElementById('panelTimeline').innerHTML = `
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 1v4M11 1v4M2 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    ${fmt(startDate)} &mdash; ${fmt(endDate)}
    <span style="margin-left:auto;font-size:12px;color:var(--text-muted)">${item.endMonth - item.startMonth} months</span>`;

  const statusColor = item.status === 'completed' ? 'var(--green)' : item.status === 'in-progress' ? 'var(--accent)' : item.status === 'at-risk' ? 'var(--amber)' : 'var(--blue-muted)';
  document.getElementById('panelProgress').innerHTML = `
    <div class="progress-label">
      <span class="panel-section-label" style="margin-bottom:0">Progress</span>
      <span style="font-size:14px;font-weight:700;color:${statusColor}">${item.progress}%</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" style="width:${item.progress}%;background:${statusColor}"></div>
    </div>`;

  document.getElementById('panelMeta').innerHTML = `
    <div class="panel-meta-item">
      <span class="panel-meta-label">Team</span>
      <span class="panel-meta-value" style="color:${team.color}">${team.name}</span>
    </div>
    <div class="panel-meta-item">
      <span class="panel-meta-label">Domain</span>
      <span class="panel-meta-value" style="color:${domain.color}">${domain.name}</span>
    </div>`;

  document.getElementById('panelWhy').innerHTML = `
    <div class="panel-section-label">Why we're doing this</div>
    <div class="panel-section-value">${item.why}</div>`;

  document.getElementById('panelBusiness').innerHTML = `
    <div class="panel-section-label">Business Case</div>
    <div class="panel-section-value">${item.businessCase}</div>`;

  if (item.dependencies.length > 0) {
    document.getElementById('panelDeps').innerHTML = `
      <div class="panel-section-label">Dependencies</div>
      <div class="panel-dependencies">${item.dependencies.map(d => `<span class="dep-tag">${d}</span>`).join('')}</div>`;
    document.getElementById('panelDeps').style.display = '';
  } else {
    document.getElementById('panelDeps').style.display = 'none';
  }

  document.getElementById('overlay').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ============ PPTX EXPORT ============
function exportToPptx() {
  const pptx = new PptxGenJS();
  pptx.layout = 'LAYOUT_WIDE';
  pptx.defineSlideMaster({
    title: 'ROADMAP',
    background: { color: '00003c' }
  });

  const STATUS_COLORS = {
    'planned': '4a6fa5',
    'in-progress': 'ea3323',
    'completed': '2ecc71',
    'at-risk': 'f0a030'
  };

  const groups = grouping === 'team' ? TEAMS : DOMAINS;
  const groupKey = grouping === 'team' ? 'team' : 'domain';

  // ---- Slide 1: Timeline Overview ----
  const slide1 = pptx.addSlide({ masterName: 'ROADMAP' });

  slide1.addText(`Product Roadmap ${YEAR}`, {
    x: 0.5, y: 0.25, w: 8, h: 0.5,
    fontSize: 22, fontFace: 'Segoe UI',
    color: 'ffffff', bold: true
  });

  slide1.addText(`Grouped by ${grouping === 'team' ? 'Team' : 'Domain'}`, {
    x: 0.5, y: 0.65, w: 4, h: 0.3,
    fontSize: 11, fontFace: 'Segoe UI',
    color: '999999'
  });

  // Legend
  const legendItems = [
    { label: 'Planned', color: '4a6fa5' },
    { label: 'In Progress', color: 'ea3323' },
    { label: 'At Risk', color: 'f0a030' },
    { label: 'Completed', color: '2ecc71' }
  ];
  legendItems.forEach((li, i) => {
    const lx = 8.5 + i * 1.2;
    slide1.addShape(pptx.ShapeType.ellipse, {
      x: lx, y: 0.35, w: 0.12, h: 0.12, fill: { color: li.color }
    });
    slide1.addText(li.label, {
      x: lx + 0.16, y: 0.27, w: 1, h: 0.28,
      fontSize: 8, fontFace: 'Segoe UI', color: '999999'
    });
  });

  // Month headers
  const labelColW = 1.6;
  const chartLeft = labelColW + 0.1;
  const chartW = 13.33 - chartLeft - 0.3;
  const monthW = chartW / 12;
  const headerY = 1.05;

  MONTHS.forEach((m, i) => {
    slide1.addText(m.name.toUpperCase(), {
      x: chartLeft + i * monthW, y: headerY, w: monthW, h: 0.3,
      fontSize: 7, fontFace: 'Segoe UI', color: '888888',
      align: 'center'
    });
    // Vertical grid line
    slide1.addShape(pptx.ShapeType.line, {
      x: chartLeft + i * monthW, y: headerY + 0.3,
      w: 0, h: 6,
      line: { color: '1a1a5a', width: 0.5 }
    });
  });

  // Quarter labels
  ['Q1', 'Q2', 'Q3', 'Q4'].forEach((q, i) => {
    slide1.addText(q, {
      x: chartLeft + i * 3 * monthW, y: headerY - 0.22, w: 3 * monthW, h: 0.22,
      fontSize: 7, fontFace: 'Segoe UI', color: '555555', align: 'center'
    });
  });

  let yPos = headerY + 0.4;
  const barH = 0.32;
  const rowStep = barH + 0.06;

  for (const [key, group] of Object.entries(groups)) {
    const items = ITEMS.filter(i => i[groupKey] === key);
    const rowAssignments = getRowAssignments(items);
    const rowCount = getRowCount(items);

    // Group label
    slide1.addText(group.name, {
      x: 0.3, y: yPos, w: labelColW, h: rowCount * rowStep,
      fontSize: 10, fontFace: 'Segoe UI', color: 'ffffff',
      bold: true, valign: 'middle'
    });

    // Subtle lane background
    slide1.addShape(pptx.ShapeType.rect, {
      x: chartLeft, y: yPos - 0.02,
      w: chartW, h: rowCount * rowStep + 0.04,
      fill: { color: '080840' },
      line: { color: '1a1a5a', width: 0.3 }
    });

    items.forEach(item => {
      const row = rowAssignments[item.id];
      const bx = chartLeft + item.startMonth * monthW;
      const bw = (item.endMonth - item.startMonth) * monthW;
      const by = yPos + row * rowStep;

      slide1.addShape(pptx.ShapeType.roundRect, {
        x: bx + 0.02, y: by, w: bw - 0.04, h: barH,
        rectRadius: 0.05,
        fill: { color: STATUS_COLORS[item.status] }
      });

      slide1.addText(item.title, {
        x: bx + 0.1, y: by, w: bw - 0.2, h: barH,
        fontSize: 8, fontFace: 'Segoe UI', color: 'ffffff',
        bold: true, valign: 'middle', shrinkText: true
      });
    });

    yPos += rowCount * rowStep + 0.2;
  }

  // ---- Slide 2+: Detail slides per group ----
  for (const [key, group] of Object.entries(groups)) {
    const items = ITEMS.filter(i => i[groupKey] === key);
    if (items.length === 0) continue;

    const slide = pptx.addSlide({ masterName: 'ROADMAP' });

    slide.addText(group.name, {
      x: 0.5, y: 0.25, w: 10, h: 0.5,
      fontSize: 22, fontFace: 'Segoe UI',
      color: 'ffffff', bold: true
    });

    slide.addShape(pptx.ShapeType.line, {
      x: 0.5, y: 0.8, w: 12.3, h: 0,
      line: { color: '1a1a5a', width: 1 }
    });

    const cols = Math.min(items.length, 3);
    const cardW = (12.3 / cols) - 0.15;
    items.forEach((item, idx) => {
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      const cx = 0.5 + col * (cardW + 0.15);
      const cy = 1.0 + row * 3.2;
      const team = TEAMS[item.team];
      const domain = DOMAINS[item.domain];

      // Card bg
      slide.addShape(pptx.ShapeType.roundRect, {
        x: cx, y: cy, w: cardW, h: 2.9,
        rectRadius: 0.08,
        fill: { color: '0a0a4a' },
        line: { color: '1a1a5a', width: 0.5 }
      });

      // Status strip
      slide.addShape(pptx.ShapeType.rect, {
        x: cx, y: cy, w: cardW, h: 0.06,
        fill: { color: STATUS_COLORS[item.status] }
      });

      // Title
      slide.addText(item.title, {
        x: cx + 0.15, y: cy + 0.15, w: cardW - 0.3, h: 0.35,
        fontSize: 12, fontFace: 'Segoe UI', color: 'ffffff', bold: true
      });

      // Status + timeline
      const startLabel = MONTHS[item.startMonth].name;
      const endLabel = MONTHS[Math.min(item.endMonth - 1, 11)].name;
      slide.addText(`${item.status.replace('-', ' ').toUpperCase()}  ·  ${startLabel} — ${endLabel} ${YEAR}`, {
        x: cx + 0.15, y: cy + 0.48, w: cardW - 0.3, h: 0.22,
        fontSize: 8, fontFace: 'Segoe UI', color: STATUS_COLORS[item.status]
      });

      // Team & Domain
      slide.addText(`Team: ${team.name}   |   Domain: ${domain.name}`, {
        x: cx + 0.15, y: cy + 0.7, w: cardW - 0.3, h: 0.2,
        fontSize: 8, fontFace: 'Segoe UI', color: '888888'
      });

      // Why
      slide.addText('WHY', {
        x: cx + 0.15, y: cy + 0.95, w: cardW - 0.3, h: 0.18,
        fontSize: 7, fontFace: 'Segoe UI', color: '666666', bold: true
      });
      slide.addText(item.why, {
        x: cx + 0.15, y: cy + 1.1, w: cardW - 0.3, h: 0.75,
        fontSize: 8, fontFace: 'Segoe UI', color: 'cccccc',
        valign: 'top', shrinkText: true
      });

      // Business Case
      slide.addText('BUSINESS CASE', {
        x: cx + 0.15, y: cy + 1.9, w: cardW - 0.3, h: 0.18,
        fontSize: 7, fontFace: 'Segoe UI', color: '666666', bold: true
      });
      slide.addText(item.businessCase, {
        x: cx + 0.15, y: cy + 2.05, w: cardW - 0.3, h: 0.7,
        fontSize: 8, fontFace: 'Segoe UI', color: 'cccccc',
        valign: 'top', shrinkText: true
      });
    });
  }

  pptx.writeFile({ fileName: `Roadmap_${YEAR}_${grouping}.pptx` });
}
